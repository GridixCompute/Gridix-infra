name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint, type-safety gates, migrations, and the full test suite (incl. the Session 6
  # integration happy path). A PR that breaks the happy path fails here (12.2).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff, zero tolerance)
        run: |
          ruff check .
          ruff format --check .

      - name: Migrations round-trip (SQLite)
        env:
          GRIDIX_DATABASE_URL: sqlite+aiosqlite:///./ci.sqlite3
        run: |
          alembic upgrade head
          alembic downgrade base

      - name: Tests (unit + integration)
        run: pytest -q

      - name: Packaging build
        run: pip install -e .

  # Build the control-plane and agent images so a broken Dockerfile fails CI (12.2),
  # and scan the image for OS/library vulnerabilities (12.6).
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build control-plane image
        run: docker build -t gridix-api:ci .
      - name: Build agent image
        run: docker build -t gridix-agent:ci ./agent
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gridix-api:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  # Dependency / supply-chain scanning (12.6): fail on known-vulnerable packages.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -e ".[dev]"
      - name: Dependency audit (pip-audit)
        run: pip-audit --strict
