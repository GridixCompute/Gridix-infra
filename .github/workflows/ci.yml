name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  # Lint, type-safety gates, migrations, and the full test suite (incl. the Session 6
  # integration happy path). A PR that breaks the happy path fails here (12.2).
  test:
    runs-on: ubuntu-latest
    # The suite is hermetic on SQLite, with one exception that cannot be: concurrent
    # charges are serialised with SELECT ... FOR UPDATE, which SQLite parses and ignores.
    # Removing that lock leaves every SQLite test green while a developer can overdraw, so
    # tests/integration/test_postgres_overdraw.py needs a real Postgres — and a test that
    # only ever skips is not a test.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gridix
          POSTGRES_PASSWORD: gridix
          POSTGRES_DB: gridix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Include the vault extra so the Vault-backend tests (which import hvac)
          # actually run instead of erroring on a missing optional module. Same for chain:
          # the KMS coordinator-signer tests (pentest H11) import eth_account to check the
          # DER→(v,r,s) reassembly, and skipping them would leave the signing path — which
          # moves real money — proven by nothing.
          pip install -e ".[dev,vault,chain]"

      - name: Lint (ruff, zero tolerance)
        run: |
          ruff check .
          ruff format --check .

      - name: Migrations round-trip (SQLite)
        env:
          GRIDIX_DATABASE_URL: sqlite+aiosqlite:///./ci.sqlite3
        run: |
          alembic upgrade head
          alembic downgrade base

      - name: Tests (unit + integration)
        env:
          GRIDIX_TEST_POSTGRES_URL: postgresql+asyncpg://gridix:gridix@localhost:5432/gridix_test
        run: pytest -q


      - name: Packaging build
        run: pip install -e .

  # Build the control-plane (shared by api/scheduler/relay) and agent images, scan both for
  # OS/library vulnerabilities (12.6), and — only on push to main or a semver tag — publish
  # them to GHCR. The Trivy gate runs BEFORE any push, so a HIGH/CRITICAL image never ships.
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image names + tags
        id: meta
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "cp_image=ghcr.io/${owner}/gridix" >> "$GITHUB_OUTPUT"
          echo "agent_image=ghcr.io/${owner}/gridix-agent" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "semver=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build control-plane image
        run: docker build -t cp:ci .
      - name: Build agent image
        run: docker build -t agent:ci ./agent

      - name: Scan control-plane (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cp:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Scan agent (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agent:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      # Publish only on push to main or a semver tag — never on PRs. Gated by the scans above.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push to GHCR
        if: github.event_name == 'push'
        env:
          CP: ${{ steps.meta.outputs.cp_image }}
          AG: ${{ steps.meta.outputs.agent_image }}
          SHA_TAG: ${{ steps.meta.outputs.sha_tag }}
          SEMVER: ${{ steps.meta.outputs.semver }}
        run: |
          push() {  # push() <local> <repo> <tag>
            docker tag "$1:ci" "$2:$3"
            docker push "$2:$3"
            echo "pushed $2:$3"
          }
          # Always: immutable sha tag.
          push cp "$CP" "$SHA_TAG"
          push agent "$AG" "$SHA_TAG"
          # main: moving :latest.
          if [[ "$GITHUB_REF" == refs/heads/main ]]; then
            push cp "$CP" latest
            push agent "$AG" latest
          fi
          # semver tag: :vX.Y.Z release.
          if [[ -n "$SEMVER" ]]; then
            push cp "$CP" "$SEMVER"
            push agent "$AG" "$SEMVER"
          fi

  # Dependency / supply-chain scanning (12.6): fail on known-vulnerable packages.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          # setuptools is upgraded past PYSEC-2026-3447 (fixed in 83.0.0).
          python -m pip install --upgrade "pip" "setuptools>=83.0.0" pip-audit
          pip install -e ".[dev]"
      - name: Dependency audit (pip-audit)
        # Skip the local editable project (gridix isn't on PyPI); still fails on any real
        # vulnerability in third-party deps. (--strict would error on the skipped package.)
        run: pip-audit --skip-editable

  # Frontend gates: lint, type-safety, unit/component tests, and a production build.
  # A PR that breaks any of these fails here.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Type-check
        run: pnpm typecheck
      - name: Tests
        run: pnpm test
      - name: Production build
        run: pnpm build

  # End-to-end tests (Sesi 12): hermetic Playwright suite — every backend call is
  # mocked at the network layer, so it needs no live backend or chain. A PR that
  # breaks the main flow (auth, submit, job lifecycle, failure paths) fails here.
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Build
        run: pnpm build
      - name: E2E
        run: pnpm test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # Anti-drift: the frontend's types are GENERATED from the backend OpenAPI schema.
  # Regenerate the snapshot + types from the live backend and fail if they differ
  # from what's committed — a schema change without a regenerate closes a whole class
  # of silent contract-drift bugs.
  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Regenerate OpenAPI snapshot + TypeScript types
        run: |
          python api/scripts/dump_openapi.py
          pnpm --dir frontend gen:types
      - name: Fail if the committed API contract drifted
        run: |
          git diff --exit-code frontend/openapi.snapshot.json frontend/src/lib/api/schema.ts \
            || { echo "::error::OpenAPI drift. Run 'python api/scripts/dump_openapi.py && pnpm --dir frontend gen:types' and commit the result."; exit 1; }
