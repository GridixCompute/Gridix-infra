name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff, zero tolerance)
        run: |
          ruff check .
          ruff format --check .

      - name: Migrations round-trip (SQLite)
        env:
          GRIDIX_DATABASE_URL: sqlite+aiosqlite:///./ci.sqlite3
        run: |
          alembic upgrade head
          alembic downgrade base

      - name: Tests
        run: pytest
