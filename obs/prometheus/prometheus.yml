global:
  scrape_interval: 15s        # deliberate: fast enough to catch churn, cheap for a small stack
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Two separate targets — the api serves DB/storage/ledger metrics, the scheduler worker
  # serves its own liveness/assignment metrics (it has no HTTP API otherwise).
  - job_name: gridix-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: gridix-scheduler
    metrics_path: /metrics
    static_configs:
      - targets: ["scheduler:9100"]
