# Smoke-test stack: no host DB/redis ports (they talk over the compose network), API on
# loopback:8080 to avoid a host that already runs postgres/redis/uvicorn. Relay omitted —
# the poll-only smoke path doesn't need it. Run from the repo root:
#   docker compose -f smoke/docker-compose.smoke.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gridix
      POSTGRES_PASSWORD: gridix
      POSTGRES_DB: gridix
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridix"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["api"]
    environment:
      GRIDIX_ENV: dev
      GRIDIX_DATABASE_URL: postgresql+asyncpg://gridix:gridix@postgres:5432/gridix
      GRIDIX_REDIS_URL: redis://redis:6379/0
      GRIDIX_SECRET_KEY: dev-insecure-secret-change-me
      GRIDIX_STORAGE_LOCAL_PATH: /data/blobs
      # Fast leases so the reaper reacts quickly during the node-death demo.
      GRIDIX_LEASE_SECONDS: "20"
    ports:
      - "127.0.0.1:8080:8000"
    volumes:
      - blobs:/data/blobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["scheduler"]
    environment:
      GRIDIX_ENV: dev
      GRIDIX_DATABASE_URL: postgresql+asyncpg://gridix:gridix@postgres:5432/gridix
      GRIDIX_REDIS_URL: redis://redis:6379/0
      GRIDIX_SECRET_KEY: dev-insecure-secret-change-me
      GRIDIX_CANARY_RATE: "0"  # no canary injection during the smoke run (image not published)
      GRIDIX_LEASE_SECONDS: "20"
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  blobs:
