# Local GRIDIX control plane: api + postgres + redis (+ scheduler, Session 3).
# `docker compose up --build` → curl localhost:8000/health == 200.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gridix
      POSTGRES_PASSWORD: gridix
      POSTGRES_DB: gridix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridix"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: ["api"]
    environment:
      GRIDIX_ENV: dev
      GRIDIX_DATABASE_URL: postgresql+asyncpg://gridix:gridix@postgres:5432/gridix
      GRIDIX_REDIS_URL: redis://redis:6379/0
      GRIDIX_SECRET_KEY: ${GRIDIX_SECRET_KEY:-dev-insecure-secret-change-me}
      GRIDIX_STORAGE_LOCAL_PATH: /data/blobs
    ports:
      - "8000:8000"
    volumes:
      - blobs:/data/blobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    command: ["scheduler"]
    environment:
      GRIDIX_ENV: dev
      GRIDIX_DATABASE_URL: postgresql+asyncpg://gridix:gridix@postgres:5432/gridix
      GRIDIX_REDIS_URL: redis://redis:6379/0
      GRIDIX_SECRET_KEY: ${GRIDIX_SECRET_KEY:-dev-insecure-secret-change-me}
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  relay:
    build: .
    command: ["relay"]
    environment:
      GRIDIX_ENV: dev
      GRIDIX_DATABASE_URL: postgresql+asyncpg://gridix:gridix@postgres:5432/gridix
      GRIDIX_REDIS_URL: redis://redis:6379/0
      GRIDIX_SECRET_KEY: ${GRIDIX_SECRET_KEY:-dev-insecure-secret-change-me}
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  blobs:
